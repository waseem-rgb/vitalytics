version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vitalytics
      POSTGRES_PASSWORD: vitalytics
      POSTGRES_DB: vitalytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://vitalytics:vitalytics@postgres:5432/vitalytics
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HARRISON_PDF_PATH=/data/harrisons.pdf
      - CHROMA_PERSIST_DIR=/data/chroma_db
    volumes:
      - ./apps/api:/app/apps/api
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8002
    depends_on:
      - api

volumes:
  pgdata:
